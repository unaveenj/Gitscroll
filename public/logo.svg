<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1C2128"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <linearGradient id="scrollGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5B800"/>
      <stop offset="100%" stop-color="#D08000"/>
    </linearGradient>
    <linearGradient id="scrollSheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0A500" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFD45C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F0A500" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="arrowGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="200" height="200" rx="32" ry="32"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="200" rx="32" ry="32" fill="url(#bgGlow)"/>

  <!-- Subtle corner accent rings -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#F0A500" stroke-width="0.5" stroke-opacity="0.1"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#F0A500" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- Scroll body: main parchment rectangle with rounded edges -->
  <g filter="url(#softGlow)" clip-path="url(#roundedClip)">
    <!-- Main scroll body -->
    <rect x="58" y="52" width="84" height="100" rx="6" ry="6" fill="url(#scrollGrad)"/>

    <!-- Sheen overlay on scroll body -->
    <rect x="58" y="52" width="84" height="100" rx="6" ry="6" fill="url(#scrollSheen)"/>

    <!-- Top rolled edge (cylinder effect) -->
    <ellipse cx="100" cy="52" rx="42" ry="10" fill="#FFD45C"/>
    <ellipse cx="100" cy="52" rx="42" ry="7" fill="#F0B820"/>
    <!-- Top roll shadow line -->
    <ellipse cx="100" cy="55" rx="42" ry="4" fill="#C07800" fill-opacity="0.3"/>

    <!-- Bottom rolled edge (unrolling) -->
    <ellipse cx="100" cy="152" rx="42" ry="10" fill="#D08000"/>
    <ellipse cx="100" cy="152" rx="42" ry="7" fill="#B86A00"/>
    <!-- Bottom roll highlight -->
    <ellipse cx="100" cy="150" rx="38" ry="4" fill="#F0A500" fill-opacity="0.4"/>

    <!-- Scroll lines (representing code/log entries) -->
    <rect x="72" y="72" width="56" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
    <rect x="72" y="82" width="44" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
    <rect x="72" y="92" width="50" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
    <rect x="72" y="102" width="38" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
    <rect x="72" y="112" width="48" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
    <rect x="72" y="122" width="42" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
    <rect x="72" y="132" width="52" height="4" rx="2" fill="#0D1117" fill-opacity="0.20"/>
  </g>

  <!-- Swipe up arrow — white, centered, glowing -->
  <g filter="url(#arrowGlow)">
    <!-- Arrow shaft -->
    <rect x="97" y="82" width="6" height="38" rx="3" fill="white" fill-opacity="0.92"/>
    <!-- Arrow head -->
    <polygon points="100,66 88,84 112,84" fill="white" fill-opacity="0.92"/>
  </g>

  <!-- Subtle white dot at arrow tip for clarity -->
  <circle cx="100" cy="66" r="2" fill="white" fill-opacity="0.7"/>
</svg>
