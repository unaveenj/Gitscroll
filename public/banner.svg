<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="60%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>

    <!-- Logo scroll gradient -->
    <linearGradient id="logoScrollGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5B800"/>
      <stop offset="100%" stop-color="#D08000"/>
    </linearGradient>

    <!-- Logo scroll sheen -->
    <linearGradient id="logoSheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0A500" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFD45C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F0A500" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow behind logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0A500" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#F0A500" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#F0A500" stop-opacity="0"/>
    </radialGradient>

    <!-- Right-side fade for decorative elements -->
    <radialGradient id="rightGlow" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#F0A500" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F0A500" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient for "GitScroll" -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0D8E0"/>
    </linearGradient>

    <!-- Soft glow filter for logo icon -->
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow glow filter -->
    <filter id="arrowGlowFilter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for banner rounded corners -->
    <clipPath id="bannerClip">
      <rect x="0" y="0" width="1200" height="400" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="400" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle, decorative) -->
  <g clip-path="url(#bannerClip)">
    <!-- Vertical grid lines -->
    <line x1="80" y1="0" x2="80" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="160" y1="0" x2="160" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="320" y1="0" x2="320" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.25"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.2"/>
    <line x1="560" y1="0" x2="560" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.15"/>
    <line x1="640" y1="0" x2="640" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.12"/>
    <line x1="720" y1="0" x2="720" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.08"/>
    <line x1="880" y1="0" x2="880" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.06"/>
    <line x1="960" y1="0" x2="960" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.05"/>
    <line x1="1040" y1="0" x2="1040" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.04"/>
    <line x1="1120" y1="0" x2="1120" y2="400" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.03"/>

    <!-- Horizontal grid lines -->
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.4"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.4"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.4"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.4"/>

    <!-- Right-side ambient glow -->
    <rect x="600" y="0" width="600" height="400" fill="url(#rightGlow)"/>

    <!-- Decorative faint circles top-right -->
    <circle cx="1050" cy="80" r="120" fill="none" stroke="#F0A500" stroke-width="0.8" stroke-opacity="0.08"/>
    <circle cx="1050" cy="80" r="200" fill="none" stroke="#F0A500" stroke-width="0.8" stroke-opacity="0.05"/>
    <circle cx="1050" cy="80" r="280" fill="none" stroke="#F0A500" stroke-width="0.8" stroke-opacity="0.03"/>

    <!-- Decorative repo cards (faint, right side) -->
    <!-- Card 1 -->
    <rect x="820" y="100" width="140" height="80" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1" stroke-opacity="0.6"/>
    <rect x="836" y="118" width="60" height="6" rx="3" fill="#8B949E" fill-opacity="0.4"/>
    <rect x="836" y="130" width="96" height="4" rx="2" fill="#8B949E" fill-opacity="0.2"/>
    <rect x="836" y="140" width="80" height="4" rx="2" fill="#8B949E" fill-opacity="0.2"/>
    <circle cx="836" cy="162" r="5" fill="#F0A500" fill-opacity="0.5"/>
    <rect x="846" y="159" width="30" height="4" rx="2" fill="#8B949E" fill-opacity="0.3"/>

    <!-- Card 2 -->
    <rect x="980" y="140" width="140" height="80" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="996" y="158" width="72" height="6" rx="3" fill="#8B949E" fill-opacity="0.3"/>
    <rect x="996" y="170" width="108" height="4" rx="2" fill="#8B949E" fill-opacity="0.15"/>
    <rect x="996" y="180" width="88" height="4" rx="2" fill="#8B949E" fill-opacity="0.15"/>
    <circle cx="996" cy="202" r="5" fill="#58A6FF" fill-opacity="0.4"/>
    <rect x="1006" y="199" width="30" height="4" rx="2" fill="#8B949E" fill-opacity="0.2"/>

    <!-- Card 3 (partial, far right) -->
    <rect x="1100" y="200" width="140" height="80" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1" stroke-opacity="0.25"/>
    <rect x="1116" y="218" width="60" height="6" rx="3" fill="#8B949E" fill-opacity="0.2"/>
    <rect x="1116" y="230" width="64" height="4" rx="2" fill="#8B949E" fill-opacity="0.1"/>

    <!-- Glow behind logo icon -->
    <ellipse cx="160" cy="200" rx="130" ry="130" fill="url(#logoGlow)"/>

    <!-- ===================== -->
    <!--   LOGO ICON (left)    -->
    <!-- ===================== -->
    <!-- Logo background rounded square -->
    <rect x="60" y="100" width="200" height="200" rx="32" ry="32" fill="#0D1117" stroke="#2D333B" stroke-width="1.5"/>

    <!-- Subtle ring accent -->
    <circle cx="160" cy="200" r="78" fill="none" stroke="#F0A500" stroke-width="0.6" stroke-opacity="0.12"/>

    <!-- Scroll body -->
    <g filter="url(#iconGlow)">
      <rect x="118" y="152" width="84" height="100" rx="6" ry="6" fill="url(#logoScrollGrad)"/>
      <rect x="118" y="152" width="84" height="100" rx="6" ry="6" fill="url(#logoSheen)"/>

      <!-- Top rolled edge -->
      <ellipse cx="160" cy="152" rx="42" ry="10" fill="#FFD45C"/>
      <ellipse cx="160" cy="152" rx="42" ry="7" fill="#F0B820"/>
      <ellipse cx="160" cy="155" rx="42" ry="4" fill="#C07800" fill-opacity="0.3"/>

      <!-- Bottom rolled edge -->
      <ellipse cx="160" cy="252" rx="42" ry="10" fill="#D08000"/>
      <ellipse cx="160" cy="252" rx="42" ry="7" fill="#B86A00"/>
      <ellipse cx="160" cy="250" rx="38" ry="4" fill="#F0A500" fill-opacity="0.4"/>

      <!-- Scroll lines -->
      <rect x="132" y="172" width="56" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
      <rect x="132" y="182" width="44" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
      <rect x="132" y="192" width="50" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
      <rect x="132" y="202" width="38" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
      <rect x="132" y="212" width="48" height="4" rx="2" fill="#0D1117" fill-opacity="0.25"/>
      <rect x="132" y="222" width="42" height="4" rx="2" fill="#0D1117" fill-opacity="0.20"/>
      <rect x="132" y="232" width="52" height="4" rx="2" fill="#0D1117" fill-opacity="0.18"/>
    </g>

    <!-- Arrow (upward swipe indicator) -->
    <g filter="url(#arrowGlowFilter)">
      <rect x="157" y="182" width="6" height="38" rx="3" fill="white" fill-opacity="0.92"/>
      <polygon points="160,166 148,184 172,184" fill="white" fill-opacity="0.92"/>
    </g>
    <circle cx="160" cy="166" r="2" fill="white" fill-opacity="0.7"/>

    <!-- ===================== -->
    <!--   TEXT CONTENT        -->
    <!-- ===================== -->

    <!-- "GitScroll" main title -->
    <text
      x="310"
      y="218"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Helvetica, Arial, sans-serif"
      font-size="88"
      font-weight="700"
      letter-spacing="-3"
      fill="url(#textGrad)"
    >GitScroll</text>

    <!-- Tagline -->
    <text
      x="314"
      y="264"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Helvetica, Arial, sans-serif"
      font-size="26"
      font-weight="400"
      letter-spacing="1"
      fill="#8B949E"
    >Discover repos. Scroll. Save.</text>

    <!-- Subtle amber accent line under title -->
    <rect x="314" y="278" width="420" height="2" rx="1" fill="#F0A500" fill-opacity="0.35"/>

    <!-- Bottom-left subtle version/label text -->
    <text
      x="314"
      y="320"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="16"
      font-weight="400"
      letter-spacing="2"
      fill="#30363D"
    >GITHUB REPO DISCOVERY</text>

  </g>
</svg>
